<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Login</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		<style>
			body { background:#f7f9fc; }
			.card { max-width: 420px; margin: 6rem auto; }
		</style>
	</head>
	<body>
		<div class="card shadow-sm">
			<div class="card-body">
				<h4 class="card-title mb-3 text-center">Sign in</h4>
				<form method="post" novalidate>
					{% csrf_token %}
					{% if form.non_field_errors %}
						<div class="alert alert-danger">
							{{ form.non_field_errors }}
						</div>
					{% endif %}

					<div class="mb-3">
						<label for="id_username" class="form-label">Username</label>
						<input type="text" name="username" class="form-control" id="id_username" value="{{ form.username.value|default_if_none:'' }}" required autofocus>
						{% if form.username.errors %}
							<div class="text-danger small">{{ form.username.errors.0 }}</div>
						{% endif %}
					</div>

					<div class="mb-3">
						<label for="id_password" class="form-label">Password</label>
						<input type="password" name="password" class="form-control" id="id_password" required>
						{% if form.password.errors %}
							<div class="text-danger small">{{ form.password.errors.0 }}</div>
						{% endif %}
					</div>

					<div class="mb-3 form-check">
						<input type="checkbox" name="remember" class="form-check-input" id="id_remember">
						<label class="form-check-label" for="id_remember">Remember me</label>
					</div>

					<div class="d-grid">
						<button type="submit" class="btn btn-primary">Login</button>
					</div>
				</form>

				<div class="mt-3 text-center small">
					<a href="#">Forgot password?</a>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	</body>
 </html>
